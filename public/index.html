        // Custom Chart.js plugin for vertical cursor
        var verticalCursorPlugin = {
            id: 'verticalCursor',
            afterDraw: function(chart) {
                if (typeof state === 'undefined' || state.currentTime === undefined || state.currentTime === null) return;
                
                var ctx = chart.ctx;
                var xAxis = chart.scales.x;
                var yAxis = chart.scales.y;
                
                var x = xAxis.getPixelForValue(state.currentTime);
                if (x < xAxis.left || x > xAxis.right) return;
                
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x, yAxis.top);
                ctx.lineTo(x, yAxis.bottom);
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ff0000';
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.restore();
            }
        };

        // Custom Chart.js plugin for lap boundary lines
        var lapLinesPlugin = {
            id: 'lapLines',
            afterDraw: function(chart) {
                if (typeof state === 'undefined' || !state.lapResults || !state.lapResults.laps) return;
                
                var ctx = chart.ctx;
                var xAxis = chart.scales.x;
                var yAxis = chart.scales.y;
                var chartArea = chart.chartArea;
                
                ctx.save();
                ctx.strokeStyle = 'rgba(128, 128, 128, 0.5)';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                
                state.lapResults.laps.forEach(function(lap) {
                    var x = xAxis.getPixelForValue(lap.startTime);
                    if (x >= chartArea.left && x <= chartArea.right) {
                        ctx.beginPath();
                        ctx.moveTo(x, chartArea.top);
                        ctx.lineTo(x, chartArea.bottom);
                        ctx.stroke();
                    }
                });
                
                ctx.restore();
            }
        };

        // Chart zoom/pan state storage
        var chartZoomState = new Map();

            id: 'chartZoomPan',
            afterInit: function(chart) {
                var duration = state.telemetry ? state.telemetry.duration : 1;
                chartZoomState.set(chart, {
                    minTime: 0,
                    maxTime: duration,
                    isDragging: false,
                    startX: 0,
                    startMinTime: 0,
                    lastUpdateTime: 0

        function t(key) {
            var lang = state.language || 'en';
            return translations[lang][key] || translations['en'][key] || key;
        }

        // Exponential Moving Average (EMA) smoothing for G-force data
        // alpha = smoothing factor (0-1), higher = less smoothing, lower = more smoothing
        // alpha = 0.2 gives ~5-sample effective window at 10Hz refresh
        function emaSmooth(data, alpha) {
            if (!data || data.length === 0) return [];
            var smoothed = [];
            smoothed[0] = data[0];
            for (var i = 1; i < data.length; i++) {
                smoothed[i] = alpha * data[i] + (1 - alpha) * smoothed[i - 1];
            }
return smoothed;
        }

        function loadStoredTracks() {
            return fetch('/api/tracks')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    state.storedTracks = data.tracks || [];
                    console.log('Loaded stored tracks:', state.storedTracks.length);
                })
                .catch(function(err) {
                    console.log('No stored tracks found, starting fresh');
                    state.storedTracks = [];
                });
        }

        function matchTrackToTelemetry() {
            if (!state.telemetry || !state.telemetry.data || state.storedTracks.length === 0) {
                return [];
            }
            var data = state.telemetry.data;
            var lats = data.map(function(d) { return d.lat; });
            var lons = data.map(function(d) { return d.lon; });
            var minLat = Math.min.apply(null, lats);
            var maxLat = Math.max.apply(null, lats);
            var minLon = Math.min.apply(null, lons);
            var maxLon = Math.max.apply(null, lons);
            var margin = 0.01;
            var matches = [];

            for (var i = 0; i < state.storedTracks.length; i++) {
                var track = state.storedTracks[i];
                var s = track.sfLine.start;
                var e = track.sfLine.end;
                if (s.lat >= minLat - margin && s.lat <= maxLat + margin &&
                    s.lon >= minLon - margin && s.lon <= maxLon + margin &&
                    e.lat >= minLat - margin && e.lat <= maxLat + margin &&
                    e.lon >= minLon - margin && e.lon <= maxLon + margin) {
                    matches.push(track);
                }
            }
            return matches;
        }

        function promptTrackNameAndSave() {
            var trackName = prompt('Track name:', 'New Track');
            if (!trackName) return;

            var newTrack = {
                name: trackName,
                sfLine: {
                    start: { lat: state.sfLine.start.lat, lon: state.sfLine.start.lon },
                    end: { lat: state.sfLine.end.lat, lon: state.sfLine.end.lon }
                }
            };

            fetch('/api/tracks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newTrack)
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    state.selectedTrackId = data.track.id;
                    return loadStoredTracks();
                }
            })
            .then(function() {
                updateSfButton();
                updateSaveTrackButton();
                render();
                updateAllText();
            })
            .catch(function(err) {
                console.error('Failed to save track:', err);
            });
        }

        function drawStoredSfLine() {
            if (state.sfLineLayer) {
                state.map.removeLayer(state.sfLineLayer);
                state.sfLineLayer = null;
            }
            state.sfLineLayer = L.polyline([
                [state.sfLine.start.lat, state.sfLine.start.lon],
                [state.sfLine.end.lat, state.sfLine.end.lon]
            ], { color: '#22c55e', weight: 4, opacity: 1 }).addTo(state.map);
        }

        function runLapDetection() {
            state.directionOverride = null;
            console.log('Calling detectLaps with sfLine:', state.sfLine);
            try {
                state.lapResults = window.detectLaps(state.telemetry.data, state.sfLine, { cooldown: 10, direction: state.directionOverride });
                console.log('detectLaps returned:', state.lapResults);

                if (state.sectorLines.length > 0 && state.lapResults && state.lapResults.laps.length > 0) {
                    var sectorResult = window.detectSectors(state.telemetry.data, state.sfLine, state.sectorLines, state.lapResults.laps);
                    state.lapResults.laps = sectorResult.laps;
                    state.lapResults.sectorIndices = sectorResult.sectorIndices;
                    console.log('detectSectors returned:', state.lapResults);
                }
            } catch (e) {
                console.error('detectLaps error:', e);
            }

            updateSfButton();
            updateLapResults();
            updateLapLabels();
        }

        function buildTrackOptions() {
            var html = '';
            for (var i = 0; i < state.storedTracks.length; i++) {
                var track = state.storedTracks[i];
                var selected = track.id === state.selectedTrackId ? ' selected' : '';
                html += '<option value="' + track.id + '"' + selected + '>' + track.name + '</option>';
            }
            return html;
        }

        // Render
        function render() {
            var app = document.getElementById('app');
            var html = '';

            if (!state.telemetry && !state.isProcessing) {
                html = renderUpload();
            } else if (state.isProcessing) {
                html = renderProcessing();
            } else if (state.error) {
                html = renderError();
            } else {
                html = renderDashboard();
            }

            app.innerHTML = html;
            attachEvents();
        }

        // Events
        function attachEvents() {
            // File input
            var fileInput = document.getElementById('file-input');
            if (fileInput) {
                fileInput.addEventListener('change', handleFileUpload);
            }

            // S/F button
            var sfBtn = document.getElementById('sf-btn');
            if (sfBtn) {
                sfBtn.addEventListener('click', toggleSfMode);
            }

            // Sector button
            var sectorBtn = document.getElementById('sector-btn');
            if (sectorBtn) {
                sectorBtn.addEventListener('click', toggleSectorMode);
            }

            // Delete Sector button
            var deleteSectorBtn = document.getElementById('delete-sector-btn');
            if (deleteSectorBtn) {
                deleteSectorBtn.addEventListener('click', deleteSelectedSector);
            }

            // Re-upload button
            var reuploadBtn = document.getElementById('reupload-btn');
            if (reuploadBtn) {
                reuploadBtn.addEventListener('click', resetToUpload);
            }

            // Language toggle
            var langToggleBtn = document.getElementById('lang-toggle-btn');
            if (langToggleBtn) {
                langToggleBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    state.language = state.language === 'en' ? 'zh' : 'en';
                    updateAllText();

                    // Rerender charts with new labels
                    if (state.speedChart) {
                        state.speedChart.destroy();
                        state.speedChart = null;
                    }
                    if (state.gforceChart) {
                        state.gforceChart.destroy();
                        state.gforceChart = null;
                    }
                    initCharts();
                    updateLapResults();
                });
            }

            // Track selector
            var trackSelector = document.getElementById('track-selector');
            if (trackSelector) {
                trackSelector.addEventListener('change', function(e) {
                    var trackId = e.target.value;
                    if (!trackId) {
                        state.selectedTrackId = null;
                        state.sfLine = null;
                        if (state.sfLineLayer) {
                            state.map.removeLayer(state.sfLineLayer);
                            state.sfLineLayer = null;
                        }
                        state.lapResults = null;
                        state.sectorLines = [];
                        if (state.sectorLineLayers) {
                            state.sectorLineLayers.forEach(function(layer) { state.map.removeLayer(layer); });
                            state.sectorLineLayers = [];
                        }
                        updateLapResults();
                        updateLapLabels();
                        updateSfButton();
                        updateSaveTrackButton();
                        render();
                        updateAllText();
                        return;
                    }
                    var track = state.storedTracks.find(function(t) { return t.id === trackId; });
                    if (track) {
                        state.selectedTrackId = track.id;
                        state.sfLine = {
                            start: { lat: track.sfLine.start.lat, lon: track.sfLine.start.lon },
                            end: { lat: track.sfLine.end.lat, lon: track.sfLine.end.lon }
                        };
                        state.lapResults = null;
                        state.sectorLines = [];
                        if (state.sectorLineLayers) {
                            state.sectorLineLayers.forEach(function(layer) { state.map.removeLayer(layer); });
                            state.sectorLineLayers = [];
                        }
                        drawStoredSfLine();
                        runLapDetection();
                        updateSaveTrackButton();
                        render();
                        updateAllText();
                    }
                });
            }

            // Save Track button
            var saveTrackBtn = document.getElementById('save-track-btn');
            if (saveTrackBtn) {
                saveTrackBtn.addEventListener('click', function() {
                    promptTrackNameAndSave();
                });
            }

            // Wait for DOM to settle then init
            setTimeout(function() {
                initMap();
                initCharts();
                startTelemetryUpdate();
            }, 50);
        }

        function handleFileUpload(e) {
            var file = e.target.files[0];
            if (!file) return;

            state.isProcessing = true;
            state.error = null;
            state.telemetry = null;
            state.videoUrl = URL.createObjectURL(file);
            state.sfLine = null;
            state.sfLineLayer = null;
            state.lapResults = null;
            state.selectedTrackId = null;
            render();
            updateAllText();

            var fd = new FormData();
            fd.append('video', file);

            fetch('http://localhost:3001/api/extract', { method: 'POST', body: fd })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    state.telemetry = data;
                    var matches = matchTrackToTelemetry();
                    if (matches.length === 1) {
                        state.sfLine = {
                            start: matches[0].sfLine.start,
                            end: matches[0].sfLine.end
                        };
                        state.selectedTrackId = matches[0].id;
                    } else if (matches.length > 1) {
                        console.warn('Multiple tracks matched - giving up on auto-load');
                        state.selectedTrackId = null;
                    }
                })
                .catch(function(err) {
                    state.error = err.message;
                })
                .finally(function() {
                    state.isProcessing = false;
                    render();
                    updateAllText();
                });
        }

        function resetToUpload() {
            // Stop video playback
            var video = document.getElementById('video-player');
            if (video) {
                video.pause();
                video.src = '';
            }
            
            // Clear telemetry and state
            state.telemetry = null;
            state.videoUrl = null;
            state.sfLine = null;
            state.sfLineLayer = null;
            state.sfMarkers.forEach(function(m) { state.map.removeLayer(m); });
            state.sfMarkers = [];
            state.lapResults = null;
            state.selectedSectorIndex = null;
            
            // Clear sector lines and markers
            state.sectorLines.forEach(function(layer) { state.map.removeLayer(layer); });
            state.sectorLines = [];
            state.sectorLineLayers.forEach(function(layer) { state.map.removeLayer(layer); });
            state.sectorLineLayers = [];
            state.sectorMarkers.forEach(function(m) { state.map.removeLayer(m); });
            state.sectorMarkers = [];
            state.sectorPlacementMode = null;
            
            // Destroy charts
            if (state.speedChart) {
                state.speedChart.destroy();
                state.speedChart = null;
            }
            if (state.gforceChart) {
                state.gforceChart.destroy();
                state.gforceChart = null;
            }
            
            // Clear zoom state
            chartZoomState.clear();

            // Show upload interface
            render();
            updateAllText();
        }

        function toggleSfMode() {
            if (!state.sfLine) {
                state.sfLine = { __placing: 'first' };
                state.sfMarkers.forEach(function(m) { state.map.removeLayer(m); });
                state.sfMarkers = [];
                if (state.sfLineLayer) {
                    state.map.removeLayer(state.sfLineLayer);
                    state.sfLineLayer = null;
                }
            } else if (state.sfLine.__placing) {
                state.sfLine = null;
                state.sfMarkers.forEach(function(m) { state.map.removeLayer(m); });
                state.sfMarkers = [];
                if (state.sfLineLayer) {
                    state.map.removeLayer(state.sfLineLayer);
                    state.sfLineLayer = null;
                }
            } else {
                state.sfLine = { __placing: 'first' };
                state.sfMarkers.forEach(function(m) { state.map.removeLayer(m); });
                state.sfMarkers = [];
                if (state.sfLineLayer) {
                    state.map.removeLayer(state.sfLineLayer);
                    state.sfLineLayer = null;
                }
                state.lapResults = null;
                state.selectedSectorIndex = null;
                state.sectorLines.forEach(function(layer) { state.map.removeLayer(layer); });
                state.sectorLines = [];
                state.sectorLineLayers.forEach(function(layer) { state.map.removeLayer(layer); });
                state.sectorLineLayers = [];
                state.sectorMarkers.forEach(function(m) { state.map.removeLayer(m); });
                state.sectorMarkers = [];
            }
            updateSfButton();
            updateLapResults();
            updateSectorButton();
        }

        function toggleSectorMode() {
            if (state.sectorLines.length >= 2) {
                return;
            }
            
            if (!state.sectorPlacementMode) {
                state.sectorPlacementMode = { __placing: 'first', lineIndex: state.sectorLines.length };
            } else if (state.sectorPlacementMode.__placing) {
                state.sectorPlacementMode = null;
                state.sectorMarkers.forEach(function(m) { state.map.removeLayer(m); });
                state.sectorMarkers = [];
                if (state.sectorLineLayers.length > 0) {
                    var lastLayer = state.sectorLineLayers.pop();
                    state.map.removeLayer(lastLayer);
                }
            } else {
                state.sectorPlacementMode = { __placing: 'first', lineIndex: state.sectorLines.length };
            }
            
            state.sectorMarkers.forEach(function(m) { state.map.removeLayer(m); });
            state.sectorMarkers = [];
            updateSectorButton();
        }

        function updateSectorButton() {
            var btn = document.getElementById('sector-btn');
            if (!btn) return;

            var btnClass = 'px-4 py-2 rounded-lg text-white ';

            if (state.sectorLines.length >= 2) {
                btnClass += 'bg-gray-400 cursor-not-allowed';
                btn.textContent = t('map.maxSectors');
            } else if (state.sectorPlacementMode && state.sectorPlacementMode.__placing === 'first') {
                btnClass += 'bg-yellow-500 hover:bg-yellow-600';
                btn.textContent = t('map.click1stPoint');
            } else if (state.sectorPlacementMode && state.sectorPlacementMode.__placing === 'second') {
                btnClass += 'bg-yellow-500 hover:bg-yellow-600';
                btn.textContent = t('map.click2ndPoint');
            } else {
                btnClass += 'bg-orange-500 hover:bg-orange-600';
                btn.textContent = t('map.addSector');
            }
            btn.className = btnClass;
            
            var deleteBtn = document.getElementById('delete-sector-btn');
            if (deleteBtn) {
                if (state.selectedSectorIndex !== null && state.sectorLines.length > 0) {
                    deleteBtn.classList.remove('hidden');
                } else {
                    deleteBtn.classList.add('hidden');
                }
            }
        }

        function selectSector(index) {
            state.selectedSectorIndex = index;
            
            for (var i = 0; i < state.sectorLineLayers.length; i++) {
                if (i === index) {
                    state.sectorLineLayers[i].setStyle({ color: '#eab308', weight: 5 });
                } else {
                    state.sectorLineLayers[i].setStyle({ color: '#f97316', weight: 4 });
                }
            }
            
            updateSectorButton();
        }

        function deleteSelectedSector() {
            if (state.selectedSectorIndex === null) return;
            
            var indexToRemove = state.selectedSectorIndex;
            
            if (indexToRemove < state.sectorLines.length) {
                state.sectorLines.splice(indexToRemove, 1);
            }
            
            if (indexToRemove < state.sectorLineLayers.length) {
                var layer = state.sectorLineLayers.splice(indexToRemove, 1)[0];
                state.map.removeLayer(layer);
            }
            
            state.selectedSectorIndex = null;
            
            for (var i = 0; i < state.sectorLineLayers.length; i++) {
                state.sectorLineLayers[i].setStyle({ color: '#f97316', weight: 4 });
            }
            
            if (state.lapResults && state.lapResults.laps.length > 0 && state.sfLine && state.sfLine.start && state.sfLine.end) {
                var sectorResult = window.detectSectors(state.telemetry.data, state.sfLine, state.sectorLines, state.lapResults.laps);
                state.lapResults.laps = sectorResult.laps;
                state.lapResults.sectorIndices = sectorResult.sectorIndices;
            }
            
            updateSectorButton();
            updateLapResults();
            
            var overlay = document.getElementById('lap-timer-overlay');
            if (overlay) overlay.style.width = 'auto';
        }

        function updateSfButton() {
            var btn = document.getElementById('sf-btn');
            if (!btn) return;

            var btnClass = 'px-4 py-2 rounded-lg text-white ';

            if (state.sfLine && state.sfLine.__placing === 'first') {
                btnClass += 'bg-yellow-500 hover:bg-yellow-600';
                btn.textContent = t('map.click1stPoint');
            } else if (state.sfLine && state.sfLine.__placing === 'second') {
                btnClass += 'bg-yellow-500 hover:bg-yellow-600';
                btn.textContent = t('map.click2ndPoint');
            } else if (state.sfLine && state.sfLine.start && state.sfLine.end) {
                btnClass += 'bg-green-600 hover:bg-green-700';
                btn.textContent = t('map.moveSfLine');
            } else {
                btnClass += 'bg-green-600 hover:bg-green-700';
                btn.textContent = t('map.setSfLine');
            }
            btn.className = btnClass;
        }

        function updateSaveTrackButton() {
            var btn = document.getElementById('save-track-btn');
            if (!btn) return;

            var show = state.sfLine && state.sfLine.start && state.sfLine.end && !state.selectedTrackId;
            btn.classList.toggle('hidden', !show);
        }

        function initMap() {
            var mapEl = document.getElementById('map');
            if (!mapEl || !state.telemetry) return;
            
            // If map exists but container changed, clean up
            if (state.map) {
                try {
                    state.map.remove();
                } catch(e) {}
                state.map = null;
            }
            
            var data = state.telemetry.data;
            var lats = data.map(function(d) { return d.lat; });
            var lons = data.map(function(d) { return d.lon; });
            var center = [(Math.min.apply(null, lats) + Math.max.apply(null, lats)) / 2, 
                         (Math.min.apply(null, lons) + Math.max.apply(null, lons)) / 2];

            state.map = L.map('map-container').setView(center, 17);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(state.map);

            var positions = data.map(function(d) { return [d.lat, d.lon]; });
            L.polyline(positions, { color: '#2563eb', weight: 3 }).addTo(state.map);

            if (state.sfLine && state.sfLine.start && state.sfLine.end) {
                drawStoredSfLine();
                runLapDetection();
                updateSaveTrackButton();
            }

            state.map.on('click', function(e) {
                var clickPos = { lat: e.latlng.lat, lon: e.latlng.lng };
                
                if (state.sectorPlacementMode && state.sectorPlacementMode.__placing) {
                    handleSectorClick(clickPos);
                    return;
                }
                
                if (state.sfLine && state.sfLine.__placing) {
                    handleSfClick(clickPos);
                    return;
                }
            });
            
            function handleSfClick(clickPos) {
                if (state.sfLine.__placing === 'first') {
                    state.sfMarkers.forEach(function(m) { state.map.removeLayer(m); });
                    state.sfMarkers = [];
                    if (state.sfLineLayer) {
                        state.map.removeLayer(state.sfLineLayer);
                        state.sfLineLayer = null;
                    }
                    
                    state.sfLine.start = clickPos;
                    state.sfLine.__placing = 'second';
                    
                    var marker = L.circleMarker([clickPos.lat, clickPos.lon], {
                        radius: 6, color: '#22c55e', fillColor: '#22c55e', fillOpacity: 1
                    }).addTo(state.map);
                    state.sfMarkers.push(marker);
                    
                    updateSfButton();
                } else if (state.sfLine.__placing === 'second') {
                    state.sfLine.end = clickPos;
                    
                    var dlat = state.sfLine.end.lat - state.sfLine.start.lat;
                    var dlon = state.sfLine.end.lon - state.sfLine.start.lon;
                    var midLat = (state.sfLine.start.lat + state.sfLine.end.lat) / 2;
                    var metersPerDegLon = 111320 * Math.cos(midLat * Math.PI / 180);
                    var metersPerDegLat = 111320;
                    var lineLength = Math.sqrt(
                        Math.pow(dlat * metersPerDegLat, 2) +
                        Math.pow(dlon * metersPerDegLon, 2)
                    );
                    
                    console.log('Line length:', lineLength, 'meters');
                    
                    if (lineLength > 20) {
                        alert('S/F line cannot be longer than 20 meters. Please set a shorter line.');
                        state.sfMarkers.forEach(function(m) { state.map.removeLayer(m); });
                        state.sfMarkers = [];
                        state.sfLine = { __placing: 'first' };
                        updateSfButton();
                        return;
                    }
                    
                    state.sfLine.__placing = null;
                    state.selectedTrackId = null;

                    var marker2 = L.circleMarker([clickPos.lat, clickPos.lon], {
                        radius: 6, color: '#22c55e', fillColor: '#22c55e', fillOpacity: 1
                    }).addTo(state.map);
                    state.sfMarkers.push(marker2);

                    state.sfLineLayer = L.polyline([
                        [state.sfLine.start.lat, state.sfLine.start.lon],
                        [state.sfLine.end.lat, state.sfLine.end.lon]
                    ], { color: '#22c55e', weight: 4, opacity: 1 }).addTo(state.map);

                    state.sfMarkers.forEach(function(m) { state.map.removeLayer(m); });
                    state.sfMarkers = [];

                    runLapDetection();
                    updateSaveTrackButton();
                    render();
                    updateAllText();
                }
            }
            
            function handleSectorClick(clickPos) {
                var lineIndex = state.sectorPlacementMode.lineIndex;
                var placing = state.sectorPlacementMode.__placing;
                
                if (placing === 'first') {
                    state.sectorMarkers.forEach(function(m) { state.map.removeLayer(m); });
                    state.sectorMarkers = [];
                    
                    if (!state.sectorLines[lineIndex]) {
                        state.sectorLines[lineIndex] = { start: null, end: null };
                    }
                    state.sectorLines[lineIndex].start = clickPos;
                    state.sectorPlacementMode.__placing = 'second';
                    
                    var marker = L.circleMarker([clickPos.lat, clickPos.lon], {
                        radius: 6, color: '#f97316', fillColor: '#f97316', fillOpacity: 1
                    }).addTo(state.map);
                    state.sectorMarkers.push(marker);
                    
                    updateSectorButton();
                } else if (placing === 'second') {
                    state.sectorLines[lineIndex].end = clickPos;
                    
                    var dlat = state.sectorLines[lineIndex].end.lat - state.sectorLines[lineIndex].start.lat;
                    var dlon = state.sectorLines[lineIndex].end.lon - state.sectorLines[lineIndex].start.lon;
                    var midLat = (state.sectorLines[lineIndex].start.lat + state.sectorLines[lineIndex].end.lat) / 2;
                    var metersPerDegLon = 111320 * Math.cos(midLat * Math.PI / 180);
                    var metersPerDegLat = 111320;
                    var lineLength = Math.sqrt(
                        Math.pow(dlat * metersPerDegLat, 2) +
                        Math.pow(dlon * metersPerDegLon, 2)
                    );
                    
                    console.log('Sector line length:', lineLength, 'meters');
                    
                    if (lineLength > 20) {
                        alert('Sector line cannot be longer than 20 meters. Please set a shorter line.');
                        state.sectorMarkers.forEach(function(m) { state.map.removeLayer(m); });
                        state.sectorMarkers = [];
                        state.sectorLines[lineIndex] = { start: null, end: null };
                        state.sectorPlacementMode.__placing = 'first';
                        updateSectorButton();
                        return;
                    }
                    
                    state.sectorPlacementMode = null;
                    
                    var marker2 = L.circleMarker([clickPos.lat, clickPos.lon], {
                        radius: 6, color: '#f97316', fillColor: '#f97316', fillOpacity: 1
                    }).addTo(state.map);
                    state.sectorMarkers.push(marker2);
                    
                    var sectorLayer = L.polyline([
                        [state.sectorLines[lineIndex].start.lat, state.sectorLines[lineIndex].start.lon],
                        [state.sectorLines[lineIndex].end.lat, state.sectorLines[lineIndex].end.lon]
                    ], { color: '#f97316', weight: 4, opacity: 1 }).on('click', function(e) {
                        L.DomEvent.stopPropagation(e);
                        selectSector(lineIndex);
                    }).addTo(state.map);
                    state.sectorLineLayers.push(sectorLayer);
                    
                    state.sectorMarkers.forEach(function(m) { state.map.removeLayer(m); });
                    state.sectorMarkers = [];
                    
                    console.log('Calling detectSectors with sectorLines:', state.sectorLines);
                    try {
                        if (state.lapResults && state.lapResults.laps.length > 0) {
                            var sectorResult = window.detectSectors(state.telemetry.data, state.sfLine, state.sectorLines, state.lapResults.laps);
                            state.lapResults.laps = sectorResult.laps;
                            state.lapResults.sectorIndices = sectorResult.sectorIndices;
                            console.log('detectSectors returned:', state.lapResults);
                        }
                    } catch (e) {
                        console.error('detectSectors error:', e);
                    }
                    
                    updateSectorButton();
                    updateLapResults();
                    
                    var overlay = document.getElementById('lap-timer-overlay');
                    if (overlay) overlay.style.width = 'auto';
                }
            }
        }

function updateLapResults() {
            var lr = state.lapResults;
            var existing = document.getElementById('lap-times');
            if (existing) existing.remove();

            if (!lr || !lr.laps || lr.laps.length === 0) return;

            var displayDir = state.directionOverride || lr.direction;
            var dirBtnHtml = displayDir ? '<button id="dir-toggle-btn" class="px-3 py-1 text-sm rounded-lg text-white bg-blue-600 hover:bg-blue-700">' + t('lapTimes.swapDir') + '</button>' : '';

            var sectorCount = state.sectorLines.length;
            var sectorHeaderHtml = '';
            if (sectorCount === 1) {
                sectorHeaderHtml = '<th class="py-2">S1</th><th class="py-2">S2</th>';
            } else if (sectorCount === 2) {
                sectorHeaderHtml = '<th class="py-2">S1</th><th class="py-2">S2</th><th class="py-2">S3</th>';
            }

            var html = '<div id="lap-times" class="bg-white rounded-lg shadow p-4 mb-6">' +
                '<div class="flex justify-between items-center mb-3">' +
                '<h2 class="text-lg font-semibold">' + t('lapTimes.title') + '</h2>' +
                dirBtnHtml +
                '</div>' +
                '<p class="text-sm text-slate-500 mb-2">' + t('lapTimes.direction') + ' ' + (displayDir || 'unknown') + ' | ' + t('lapTimes.best') + ' ' + lr.bestLap.toFixed(3) + 's</p>' +
                '<table class="w-full text-left"><thead><tr class="border-b"><th class="py-2">' + t('lapTimes.lap') + '</th><th class="py-2">' + t('lapTimes.time') + '</th>' + sectorHeaderHtml + '<th class="py-2">' + t('lapTimes.delta') + '</th><th class="py-2">' + t('lapTimes.maxSpeed') + '</th><th class="py-2">' + t('lapTimes.minSpeed') + '</th></tr></thead><tbody>';
            for (var i = 0; i < lr.laps.length; i++) {
                var lap = lr.laps[i];
                var deltaClass = lap.delta >= 0 ? 'text-red-500' : 'text-green-500';

                var sectorCellsHtml = '';
                if (sectorCount === 1) {
                    var s1Time = lap.sectorTimes ? lap.sectorTimes.s1 : null;
                    var s3Time = lap.sectorTimes ? lap.sectorTimes.s3 : null;
                    sectorCellsHtml = '<td class="py-2">' + (s1Time !== null ? s1Time.toFixed(3) + 's' : '-') + '</td>' +
                                     '<td class="py-2">' + (s3Time !== null ? s3Time.toFixed(3) + 's' : '-') + '</td>';
                } else if (sectorCount === 2) {
                    var s1Time = lap.sectorTimes ? lap.sectorTimes.s1 : null;
                    var s2Time = lap.sectorTimes ? lap.sectorTimes.s2 : null;
                    var s3Time = lap.sectorTimes ? lap.sectorTimes.s3 : null;
                    sectorCellsHtml = '<td class="py-2">' + (s1Time !== null ? s1Time.toFixed(3) + 's' : '-') + '</td>' +
                                     '<td class="py-2">' + (s2Time !== null ? s2Time.toFixed(3) + 's' : '-') + '</td>' +
                                     '<td class="py-2">' + (s3Time !== null ? s3Time.toFixed(3) + 's' : '-') + '</td>';
                }

                html += '<tr class="border-b"><td class="py-2">' + lap.lap + '</td><td class="py-2">' + lap.duration.toFixed(3) + 's</td>' + sectorCellsHtml + '<td class="py-2 ' + deltaClass + '">' + (lap.delta >= 0 ? '+' : '') + lap.delta.toFixed(3) + 's</td><td class="py-2">' + lap.maxSpeed.toFixed(1) + ' km/h</td><td class="py-2">' + lap.minSpeed.toFixed(1) + ' km/h</td></tr>';
            }
            html += '</tbody></table></div>';
            
            var mapDiv = document.getElementById('map');
            if (mapDiv && mapDiv.parentElement) {
                mapDiv.parentElement.parentElement.insertAdjacentHTML('beforeend', html);
            }
            
            var dirBtn = document.getElementById('dir-toggle-btn');
            if (dirBtn) {
                dirBtn.addEventListener('click', toggleDirection);
            }
        }

        function toggleDirection() {
            if (state.directionOverride) {
                state.directionOverride = null;
            } else {
                var currentDir = state.lapResults.direction;
                if (currentDir) {
                    state.directionOverride = currentDir === 'clockwise' ? 'counter-clockwise' : 'clockwise';
                }
            }
            
            if (state.sfLine && state.sfLine.start && state.sfLine.end) {
                state.lapResults = window.detectLaps(state.telemetry.data, state.sfLine, { cooldown: 10, direction: state.directionOverride });
                
                if (state.sectorLines.length > 0) {
                    var sectorResult = window.detectSectors(state.telemetry.data, state.sfLine, state.sectorLines, state.lapResults.laps);
                    state.lapResults.laps = sectorResult.laps;
                    state.lapResults.sectorIndices = sectorResult.sectorIndices;
                }
            }
            
            updateLapResults();
            updateLapLabels();
        }

        // Chart zoom/pan functions
        function handleChartWheel(chart, e) {
            e.preventDefault();
            var zoomState = chartZoomState.get(chart);
            if (!zoomState) return;
            
            var duration = state.telemetry ? state.telemetry.duration : 1;
            var zoomRange = zoomState.maxTime - zoomState.minTime;
            var chartArea = chart.chartArea;
            var mouseX = e.offsetX;
            
            // Convert mouse X to time position
            var timeAtMouse = zoomState.minTime + (mouseX - chartArea.left) / (chartArea.right - chartArea.left) * zoomRange;
            
            // Zoom direction: wheel up = zoom in, wheel down = zoom out
            var zoomFactor = e.deltaY > 0 ? 1.1 : 0.9; // 10% zoom per tick
            var newRange = zoomRange * zoomFactor;
            
            // Clamp to limits
            newRange = Math.max(60, Math.min(duration, newRange));
            
            // Calculate new min/max centered on mouse position
            var ratio = (timeAtMouse - zoomState.minTime) / zoomRange;
            var newMinTime = timeAtMouse - ratio * newRange;
            var newMaxTime = newMinTime + newRange;
            
            // Clamp to valid range
            if (newMinTime < 0) {
                newMinTime = 0;
                newMaxTime = newRange;
            }
            if (newMaxTime > duration) {
                newMaxTime = duration;
                newMinTime = duration - newRange;
            }
            
            // Update zoom state
            zoomState.minTime = newMinTime;
            zoomState.maxTime = newMaxTime;
            
            // Update chart options (not just scales)
            chart.options.scales.x.min = newMinTime;
            chart.options.scales.x.max = newMaxTime;
            chart.update();
            
            // Update lap labels
            updateLapLabels();
        }

        function handleChartMouseDown(chart, e) {
            var zoomState = chartZoomState.get(chart);
            if (!zoomState) return;
            
            zoomState.isDragging = true;
            zoomState.startX = e.clientX;
            zoomState.startMinTime = zoomState.minTime;
        }

        function handleChartMouseMove(chart, e) {
            var zoomState = chartZoomState.get(chart);
            if (!zoomState || !zoomState.isDragging) return;
            
            // Throttle to ~60fps
            var now = Date.now();
            if (now - zoomState.lastUpdateTime < 16) return;
            zoomState.lastUpdateTime = now;
            
            var duration = state.telemetry ? state.telemetry.duration : 1;
            var zoomRange = zoomState.maxTime - zoomState.minTime;
            var chartArea = chart.chartArea;
            var chartWidth = chartArea.right - chartArea.left;
            
            // Only pan if zoomed in
            if (zoomRange >= duration) return;
            
            // Calculate drag delta in pixels
            var deltaX = e.clientX - zoomState.startX;
            
            // Convert to time delta
            var timePerPixel = zoomRange / chartWidth;
            var timeDelta = deltaX * timePerPixel;
            
            // Calculate new min/max
            var newMinTime = zoomState.startMinTime - timeDelta;
            var newMaxTime = newMinTime + zoomRange;
            
            // Clamp to valid range
            if (newMinTime < 0) {
                newMinTime = 0;
                newMaxTime = zoomRange;
            }
            if (newMaxTime > duration) {
                newMaxTime = duration;
                newMinTime = duration - zoomRange;
            }
            
            // Update zoom state
            zoomState.minTime = newMinTime;
            zoomState.maxTime = newMaxTime;
            
            // Update chart options
            chart.options.scales.x.min = newMinTime;
            chart.options.scales.x.max = newMaxTime;
            chart.update();
            
            // Update lap labels
            updateLapLabels();
        }

        function handleChartMouseUp(chart) {
            var zoomState = chartZoomState.get(chart);
            if (!zoomState) return;
            zoomState.isDragging = false;
        }

        function handleChartDblClick(chart, e) {
            if (!chart || !chart.scales.x) return;

            var video = document.getElementById('video-player');
            if (!video) return;

            var canvas = chart.canvas;
            var canvasRect = canvas.getBoundingClientRect();

            var pixelX = e.clientX - canvasRect.left;

            var chartArea = chart.chartArea;
            if (pixelX < chartArea.left || pixelX > chartArea.right) return;

            var time = chart.scales.x.getValueForPixel(pixelX);

            var duration = state.telemetry ? state.telemetry.duration : 0;
            if (time < 0) time = 0;
            if (time > duration) time = duration;

            video.currentTime = time;
        }

        function initCharts() {
            if (!state.telemetry || !state.telemetry.data) return;

            var data = state.telemetry.data;

            // Speed
            var speedCtx = document.getElementById('speed-chart-canvas');
            if (speedCtx && speedCtx.parentElement) {
                var maxSpeed = Math.max.apply(null, data.map(function(d) { return d.speed; }));
                var speedMax = Math.ceil(maxSpeed / 10) * 10 + 10;
                var duration = state.telemetry.duration;
                
                if (state.speedChart) state.speedChart.destroy();
                
                // Use scatter format for proper axis control
                var speedData = data.map(function(d) { return {x: d.t, y: d.speed}; });
                
                state.speedChart = new Chart(speedCtx, {
                    type: 'line',
                    data: {
                        datasets: [{
                            label: t('charts.speed'),
                            data: speedData,
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37,99,235,0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            tension: 0.3,
                            fill: true
                        }]
                    },
                    options: {
                        animation: false,
                        parsing: false,
                        normalized: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: {
                                type: 'linear',
                                min: 0,
                                max: duration,
                                title: { display: true, text: t('charts.time') },
                                ticks: {
                                    callback: function(value) {
                                        var mins = Math.floor(value / 60);
                                        var secs = Math.floor(value % 60);
                                        return mins + ':' + (secs < 10 ? '0' : '') + secs;
                                    }
                                }
                            },
                            y: {
                                min: 0,
                                max: speedMax,
                                title: { display: true, text: t('charts.kmh') }
                            }
                        },
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });
                state.speedChart.canvas.style.height = '256px';
                
                // Add zoom/pan event listeners to speed chart
                speedCtx.addEventListener('wheel', function(e) { handleChartWheel(state.speedChart, e); });
                speedCtx.addEventListener('mousedown', function(e) { handleChartMouseDown(state.speedChart, e); });
                speedCtx.addEventListener('mousemove', function(e) { handleChartMouseMove(state.speedChart, e); });
                speedCtx.addEventListener('mouseup', function() { handleChartMouseUp(state.speedChart); });
                speedCtx.addEventListener('mouseleave', function() { handleChartMouseUp(state.speedChart); });
                speedCtx.addEventListener('dblclick', function(e) { handleChartDblClick(state.speedChart, e); });
            }

            // G-Force
            var gCtx = document.getElementById('gforce-chart-canvas');
            if (gCtx && gCtx.parentElement) {
                var rawGy = data.map(function(d) { return d.gy; });
                var rawGz = data.map(function(d) { return d.gz; });
                var smoothGy = emaSmooth(rawGy, 0.2);
                var smoothGz = emaSmooth(rawGz, 0.2);
                
                var allGx = smoothGz.map(function(v) { return Math.abs(v); });
                var allGy = smoothGy.map(function(v) { return Math.abs(v); });
                var maxG = Math.max(Math.max.apply(null, allGx), Math.max.apply(null, allGy));
                var gBound = Math.max(1, Math.ceil(maxG));
                var duration = state.telemetry.duration;

                if (state.gforceChart) state.gforceChart.destroy();
                
                state.gforceChart = new Chart(gCtx, {
                    type: 'line',
                    data: {
                        datasets: [
                            { label: t('charts.longitudinal'), data: data.map(function(d, i) { return {x: d.t, y: smoothGz[i]}; }), borderColor: '#ef4444', borderWidth: 2, pointRadius: 0, tension: 0.3 },
                            { label: t('charts.lateral'), data: data.map(function(d, i) { return {x: d.t, y: smoothGy[i]}; }), borderColor: '#22c55e', borderWidth: 2, pointRadius: 0, tension: 0.3 }
                        ]
                    },
                    options: {
                        animation: false,
                        parsing: false,
                        normalized: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: true }
                        },
                        scales: {
                            x: {
                                type: 'linear',
                                min: 0,
                                max: duration,
                                title: { display: true, text: t('charts.time') },
                                ticks: {
                                    callback: function(value) {
                                        var mins = Math.floor(value / 60);
                                        var secs = Math.floor(value % 60);
                                        return mins + ':' + (secs < 10 ? '0' : '') + secs;
                                    }
                                }
                            },
                            y: {
                                min: -gBound,
                                max: gBound,
                                title: { display: true, text: t('charts.g') }
                            }
                        }
                    }
                });
                state.gforceChart.canvas.style.height = '256px';
                
                // Add zoom/pan event listeners to G-force chart
                gCtx.addEventListener('wheel', function(e) { handleChartWheel(state.gforceChart, e); });
                gCtx.addEventListener('mousedown', function(e) { handleChartMouseDown(state.gforceChart, e); });
                gCtx.addEventListener('mousemove', function(e) { handleChartMouseMove(state.gforceChart, e); });
                gCtx.addEventListener('mouseup', function() { handleChartMouseUp(state.gforceChart); });
                gCtx.addEventListener('mouseleave', function() { handleChartMouseUp(state.gforceChart); });
                gCtx.addEventListener('dblclick', function(e) { handleChartDblClick(state.gforceChart, e); });
            }
            
            updateLapLabels();
        }

        function updateLapLabels() {
            if (!state.lapResults || !state.lapResults.laps || state.lapResults.laps.length === 0) {
                var speedLabels = document.getElementById('speed-lap-labels');
                var gforceLabels = document.getElementById('gforce-lap-labels');
                if (speedLabels) speedLabels.innerHTML = '';
                if (gforceLabels) gforceLabels.innerHTML = '';
                return;
            }
            
            var laps = state.lapResults.laps;
            
            function createLabels(containerId, chart) {
                var container = document.getElementById(containerId);
                if (!container || !chart) return;
                container.innerHTML = '';
                
                var chartArea = chart.chartArea;
                var chartCanvas = chart.canvas;
                var canvasRect = chartCanvas.getBoundingClientRect();
                
                container.style.left = chartArea.left + 'px';
                container.style.width = (chartArea.right - chartArea.left) + 'px';
                container.style.top = (chartArea.bottom - 30) + 'px';
                container.style.height = '20px';
                
                laps.forEach(function(lap) {
                    var zoomState = chartZoomState.get(chart);
                    if (!zoomState) return;
                    
                    // Only show label if lap start is within visible range
                    if (lap.startTime < zoomState.minTime || lap.startTime > zoomState.maxTime) {
                        return;
                    }
                    
                    var xAxis = chart.scales.x;
                    var pixelX = xAxis.getPixelForValue(lap.startTime);
                    
                    var label = document.createElement('span');
                    label.textContent = 'Lap ' + lap.lap;
                    label.style.position = 'absolute';
                    label.style.left = (pixelX - chartArea.left) + 'px';
                    label.style.transform = 'translateX(-50%)';
                    label.style.cursor = 'pointer';
                    label.style.color = '#eab308';
                    label.style.fontSize = '12px';
                    label.style.whiteSpace = 'nowrap';
                    label.style.pointerEvents = 'auto';
                    label.style.padding = '2px 4px';
                    label.style.backgroundColor = 'rgba(0,0,0,0.7)';
                    label.style.borderRadius = '2px';
                    
                    label.addEventListener('click', function() {
                        var video = document.getElementById('video-player');
                        if (video) {
                            video.currentTime = lap.startTime;
                        }
                    });
                    
                    container.appendChild(label);
                });
            }
            
            createLabels('speed-lap-labels', state.speedChart);
            createLabels('gforce-lap-labels', state.gforceChart);
        }

        function updateLapTimer() {
            var overlay = document.getElementById('lap-timer-overlay');
            if (!overlay) return;
            
            var lr = state.lapResults;
            var video = document.getElementById('video-player');
            
            if (!video || !lr || !lr.laps || lr.laps.length === 0) {
                overlay.style.display = 'none';
                return;
            }
            
            overlay.style.display = 'block';
            
            var ct = video.currentTime;
            var currentLap = null;
            var isShowingFinalTime = false;
            var showLapTime = false;
            var currentLapTime = 0;
            
            // Check if we're in a completed lap (between endTime and endTime + 5s)
            for (var i = 0; i < lr.laps.length; i++) {
                var lap = lr.laps[i];
                if (ct >= lap.endTime && ct < lap.endTime + 5) {
                    currentLap = lap;
                    isShowingFinalTime = true;
                    showLapTime = true;
                    currentLapTime = lap.duration;
                    break;
                }
            }
            
            // If not showing final time, find current active lap
            if (!isShowingFinalTime) {
                for (var i = 0; i < lr.laps.length; i++) {
                    if (ct >= lr.laps[i].startTime && ct < lr.laps[i].endTime) {
                        currentLap = lr.laps[i];
                        showLapTime = true;
                        currentLapTime = ct - currentLap.startTime;
                        break;
                    }
                }
                
                // If past all laps, use last lap as current
                if (!currentLap && ct >= lr.laps[lr.laps.length - 1].startTime) {
                    currentLap = lr.laps[lr.laps.length - 1];
                    showLapTime = true;
                    currentLapTime = currentLap.duration;
                }
            }
            
            // Calculate "best so far" - best lap among completed laps up to current time
            var bestSoFar = null;
            
            for (var i = 0; i < lr.laps.length; i++) {
                var lap = lr.laps[i];
                if (lap.endTime <= ct) {
                    if (!bestSoFar || lap.duration < bestSoFar) {
                        bestSoFar = lap.duration;
                    }
                }
            }
            
            // Update best lap time display
            var bestLapEl = document.getElementById('best-lap-time');
            bestLapEl.textContent = bestSoFar !== null ? bestSoFar.toFixed(2) + 's' : '--.--s';
            
            // Update lap number and time
            if (currentLap && showLapTime) {
                document.getElementById('current-lap-num').textContent = currentLap.lap;
                document.getElementById('current-lap-time').textContent = currentLapTime.toFixed(2) + 's';
            } else {
                document.getElementById('current-lap-num').textContent = '-';
                document.getElementById('current-lap-time').textContent = '--.--s';
            }
            
            // Update sector times
            var sectorRow = document.getElementById('sector-times-row');
            var sectorCount = state.sectorLines.length;
            
            if (sectorCount === 0) {
                sectorRow.style.display = 'none';
            } else {
                sectorRow.style.display = 'flex';
                
                var s1El = document.getElementById('s1-time');
                var s2El = document.getElementById('s2-time');
                var s3Container = document.getElementById('s3-container');
                var s3El = document.getElementById('s3-time');
                
                if (sectorCount === 1) {
                    s2El.parentElement.style.display = 'inline';
                    s3Container.style.display = 'none';
                } else if (sectorCount === 2) {
                    s2El.parentElement.style.display = 'inline';
                    s3Container.style.display = 'inline';
                }
                
                if (currentLap && currentLap.sectorTimes) {
                    var lapStartTime = currentLap.startTime;
                    var s1Time = currentLap.sectorTimes.s1;
                    var s2Time = currentLap.sectorTimes.s2;
                    var s3Time = currentLap.sectorTimes.s3;
                    
                    if (isShowingFinalTime) {
                        s1El.textContent = s1Time !== null ? s1Time.toFixed(2) : '--.--';
                        if (sectorCount === 1) {
                            s2El.textContent = s3Time !== null ? s3Time.toFixed(2) : '--.--';
                        } else {
                            s2El.textContent = s2Time !== null ? s2Time.toFixed(2) : '--.--';
                            s3El.textContent = s3Time !== null ? s3Time.toFixed(2) : '--.--';
                        }
                    } else {
                        var s1Threshold = lapStartTime + (s1Time !== null ? s1Time : 0);
                        var s2Threshold = s1Threshold + (s2Time !== null ? s2Time : 0);
                        
                        if (s1Time !== null && ct >= s1Threshold) {
                            s1El.textContent = s1Time.toFixed(2);
                        } else {
                            s1El.textContent = '--.--';
                        }
                        
                        if (sectorCount === 1) {
                            s2El.textContent = '--.--';
                        } else {
                            if (s2Time !== null && ct >= s2Threshold) {
                                s2El.textContent = s2Time.toFixed(2);
                            } else {
                                s2El.textContent = '--.--';
                            }
                            s3El.textContent = '--.--';
                        }
                    }
                } else {
                    s1El.textContent = '--.--';
                    s2El.textContent = '--.--';
                    s3El.textContent = '--.--';
                }
            }
            
            // Fix overlay width to prevent flickering as times change
            var overlay = document.getElementById('lap-timer-overlay');
            if (overlay && overlay.style.display !== 'none') {
                overlay.style.width = overlay.offsetWidth + 'px';
            }
        }

        function startTelemetryUpdate() {
            if (state.updateInterval) clearInterval(state.updateInterval);
            state.updateInterval = setInterval(function() {
                var video = document.getElementById('video-player');
                if (!video || !state.telemetry || !state.telemetry.data) return;

                var ct = video.currentTime;
                state.currentTime = ct;
                
                var data = state.telemetry.data;
                var closest = data[0];
                var minDiff = Math.abs(closest.t - ct);

                for (var i = 0; i < data.length; i++) {
                    var diff = Math.abs(data[i].t - ct);
                    if (diff < minDiff) { minDiff = diff; closest = data[i]; }
                }

                var speedEl = document.getElementById('speed-display');
                var gxEl = document.getElementById('gx-display');
                var gyEl = document.getElementById('gy-display');
                var altEl = document.getElementById('alt-display');

                if (speedEl) speedEl.textContent = closest.speed.toFixed(1) + ' km/h';
                if (gxEl) gxEl.textContent = closest.gz.toFixed(2);
                if (gyEl) gyEl.textContent = closest.gy.toFixed(2);
                if (altEl) altEl.textContent = closest.alt.toFixed(0) + 'm';

                if (state.speedChart) state.speedChart.update('none');
                if (state.gforceChart) state.gforceChart.update('none');
                
                updateLapTimer();
            }, 100);
        }

        // Start
        loadStoredTracks();
        render();
    })();
    </script>
